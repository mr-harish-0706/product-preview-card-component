<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="product-card">
      <div class="product-image"></div>
      <div class="product-content">
        <p class="product-cateagory">PERFUME</p>
        <h2 class="product-title">
          Gabrielle <br />
          Essence Eau <br />
          De Parfum
        </h2>
        <p class="product-discription">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <p class="product-price">
          <b>$149.99</b><sup> <strike>$169.99</strike></sup>
        </p>
        <button class="add-to-cart">
          <img src="./images/icon-cart.svg" alt="" />
          Add to Cart
        </button>
      </div>
    </div>

    <footer>
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/product-preview-card-component-GO7UmttRfa"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/mr-harish-0706"
        >@mr-harish-0706</a
      >.
    </footer>
  </body>
</html>
